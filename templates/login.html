<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - YouTube Channel Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 40px 32px;
            text-align: center;
        }

        .login-logo {
            margin-bottom: 32px;
        }

        .login-logo svg {
            width: 56px;
            height: 56px;
            margin-bottom: 16px;
        }

        .login-logo h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .login-logo p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .login-form {
            margin-top: 24px;
        }

        .login-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            transition: all 0.2s ease;
            margin-bottom: 16px;
            text-align: center;
            box-sizing: border-box;
        }

        .login-input:focus {
            outline: none;
            border-color: var(--accent-purple);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        .login-input::placeholder {
            color: var(--text-muted);
        }

        .login-error {
            color: var(--error);
            font-size: 0.875rem;
            margin-bottom: 16px;
            padding: 10px 16px;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: var(--radius-sm);
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card glass-card">
            <div class="login-logo">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M24 4L4 14v20l20 10 20-10V14L24 4z" stroke="url(#grad1)" stroke-width="2" fill="none" />
                    <path d="M24 14v20M14 19l10 5 10-5" stroke="url(#grad1)" stroke-width="2" />
                    <defs>
                        <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#a855f7" />
                            <stop offset="100%" style="stop-color:#06b6d4" />
                        </linearGradient>
                    </defs>
                </svg>
                <h1>YouTube Channel Analyzer</h1>
                <p>Enter the team password to continue</p>
            </div>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form class="login-form" method="POST" action="/login">
                <input type="password" name="password" class="login-input"
                    placeholder="Password" autofocus autocomplete="current-password">
                <button type="submit" class="start-btn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-icon">&#8594;</span>
                </button>
            </form>
        </div>
    </div>
</body>

</html>
